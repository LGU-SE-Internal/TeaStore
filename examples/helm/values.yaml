# OpenTelemetry Instrumentation settings
opentelemetry:
  enabled: true
  # Language type for auto-instrumentation (drives the
  # `instrumentation.opentelemetry.io/inject-<language>` pod annotation).
  # Supported: java, python, nodejs, dotnet, go, ruby, php
  language: java
  # Name of the OpenTelemetry `Instrumentation` custom resource the operator
  # should inject. Used as the right-hand side of the inject annotation:
  #   instrumentation.opentelemetry.io/inject-<language>: "<monitoringNamespace>/<instrumentationName>"
  # Override when your Instrumentation CR has a different name.
  instrumentationName: "opentelemetry-kube-stack"
  # Namespace where the `Instrumentation` CR above lives. Override when the
  # operator is configured with its CR outside the conventional `monitoring`
  # namespace (e.g. `otel`, `observability`). The operator webhook silently
  # skips injection if <namespace>/<name> does not resolve.
  monitoringNamespace: "monitoring"
  # OTLP exporter endpoint for traces and logs.
  # Defaults to the per-namespace collector sidecar deployed by this chart
  # (see .Values.otelCollector); the bare "otel-collector" hostname resolves to
  # the same-namespace ClusterIP service via kube-dns. Override with
  # --set opentelemetry.otlpEndpoint=<url> to route at a shared cluster-wide
  # collector (e.g.
  # http://opentelemetry-kube-stack-deployment-collector.monitoring.svc.cluster.local:4317)
  # — typical when otelCollector.enabled=false.
  otlpEndpoint: "http://otel-collector:4317"
  # OTLP protocol: grpc or http/protobuf
  otlpProtocol: "grpc"
  # Enable logs export via OTLP
  logsExporterEnabled: true
  # Enable traces export via OTLP
  tracesExporterEnabled: true
  # Enable metrics export via OTLP
  metricsExporterEnabled: true
  # Sampling ratio (1.0 = 100% sampling)
  samplingRatio: "1.0"

# Per-namespace OTLP collector sidecar.
#
# Deploys a single-replica otel-collector-contrib in the release namespace so each
# teastore install gets its own queue and exporter to ClickHouse, instead of all
# namespaces fanning into one shared cluster-wide collector (which saturates its
# ClickHouse exporter sending_queue and silently drops spans). Mirrors the
# train-ticket per-ns sidecar (OperationsPAI/train-ticket#24); see aegis #367.
#
# Disable to fall back to a shared collector — also override
# .opentelemetry.otlpEndpoint to point at that collector's URL.
otelCollector:
  enabled: true
  name: otel-collector
  replicas: 1
  image:
    # Public upstream image; byte-cluster pulls via its registry mirror automatically
    # (volces auto-mirrors docker.io/opspai/* under pair-cn-shanghai.cr.volces.com/opspai/*).
    # Override to a private mirror by setting --set otelCollector.image.repository=...
    repository: docker.io/opspai/opentelemetry-collector-contrib
    tag: "0.142.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  clickhouse:
    endpoint: "tcp://clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4&username=default"
    database: otel
    tracesTableName: otel_traces
    metricsTableName: otel_metrics
    logsTableName: otel_logs
    ttl: 72h
    timeout: 30s
  sendingQueue:
    enabled: true
    numConsumers: 10
    queueSize: 5000
    blocking: true
  batch:
    sendBatchSize: 2000
    sendBatchMaxSize: 4000
    timeout: 5s
  memoryLimiter:
    limitPercentage: 75
    spikeLimitPercentage: 15

# HTTP Load Generator settings
httploadgen:
  enabled: false
  replicaCount: 1
  image:
    # Leave empty to use global.image.registry
    registry: ""
    name: "teastore-httploadgen"
    pullPolicy: Always
    # Leave empty to use global.image.tag
    tag: ""
  service:
    type: ClusterIP
    port: 24226
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}

# HTTP Load Director settings
httploaddirector:
  enabled: false
  restartPolicy: Never
  image:
    # Leave empty to use global.image.registry
    registry: ""
    name: "teastore-httploaddirector"
    pullPolicy: Always
    # Leave empty to use global.image.tag
    tag: ""
  # Load profile to use (file path in container)
  loadProfile: "/director/profiles/increasingLowIntensity.csv"
  # Lua script to use (file path in container)
  luaScript: "/director/scripts/teastore_browse.lua"
  # Output file path
  outputFile: "/director/results/output.csv"
  # Number of load generation threads
  numThreads: 10
  # Docker monitoring configuration
  dockerMonitor:
    enabled: false
    # Comma-separated values: <IP>:<PORT>:<CONTAINER_ID>,<IP>:<PORT>:<CONTAINER_ID>
    targets: ""
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi
  nodeSelector: {}

# JMeter Load Testing settings
jmeter:
  enabled: true
  backoffLimit: 3
  restartPolicy: OnFailure
  image:
    # Leave empty to use global.image.registry
    registry: ""
    name: "teastore-jmeter"
    pullPolicy: Always
    # Leave empty to use global.image.tag
    tag: ""
  # Image used by the `wait-for-registry` init container. Override on
  # air-gapped / mirrored-registry clusters that cannot pull from docker.io.
  # Leaving `registry` empty preserves the historical default of pulling
  # `busybox:1.36` from docker.io (no behavior change for existing users).
  # Example for a mirrored registry:
  #   --set jmeter.waitForRegistryImage.registry=pair-cn-shanghai.cr.volces.com/opspai
  # produces: pair-cn-shanghai.cr.volces.com/opspai/busybox:1.36
  waitForRegistryImage:
    registry: ""
    repository: "busybox"
    tag: "1.36"
    pullPolicy: ""
  # Target WebUI service
  targetHost: "teastore-webui"
  targetPort: "8080"
  # Resource limits to prevent OOM and cluster resource exhaustion
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  # Test configuration (add these if not present)
  # Defaults capped to keep span-emission rate in line with other DSB-style
  # benchmarks (TT, sockshop, otel-demo). Earlier defaults of numUsers=10 +
  # duration=300 produced ~22x the spans/sec of comparable benchmarks and
  # could overload shared OTel collector / ClickHouse pipelines when several
  # teastore namespaces ran in parallel. Override via --set jmeter.numUsers=10
  # --set jmeter.duration=300 if your collector pipeline can absorb it.
  # See: https://github.com/OperationsPAI/aegis/issues/216
  numUsers: 2
  rampUp: 60
  duration: 120
  testPlan: "teastore_browse.jmx"
  nodeSelector: {}
